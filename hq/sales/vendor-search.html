<script>
const FMT = n => (n != null && n !== 0) ? '¥' + Math.round(n).toLocaleString() : '¥0';

let allVendors = [];
let monthlyData = [];
let salesCrossRef = null;
let currentTab = 'search';

let corrections = {};

async function loadCorrections() {
  try {
    // まずAPI（ローカルサーバー）を試行、なければ静的JSONファイルをfetch
    let r;
    try {
      r = await fetch('/api/corrections');
      if (!r.ok || r.headers.get('content-type')?.includes('text/html')) throw new Error('not API');
    } catch(e) {
      r = await fetch('vendor-corrections.json');
    }
    const data = await r.json();
    corrections = data.corrections || {};
  } catch(e) {}
}

async function saveVendorCorrection(vendorName, correction) {
  corrections[vendorName] = correction;
  await fetch('/api/corrections/' + encodeURIComponent(vendorName), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(correction)
  });
}

function getDisplayProjects(vendor) {
  const c = corrections[vendor.name];
  if (!c) return vendor.projects;

  // Start with project-level mappings
  let result = vendor.projects.map(p => {
    const mapping = (c.projectMappings || []).find(m => m.original === p.name);
    if (mapping) return { ...p, name: mapping.corrected, originalName: p.name };
    return { ...p };
  });

  // Apply entry-level corrections: aggregate corrected project names from entryCorrections
  if (c.entryCorrections && c.entryCorrections.length > 0) {
    const entrySummary = {}; // correctedProject → { count, total, firstPeriod, lastPeriod }
    c.entryCorrections.forEach(ec => {
      if (!entrySummary[ec.correctedProject]) entrySummary[ec.correctedProject] = { count: 0, total: 0, firstPeriod: ec.period, lastPeriod: ec.period };
      entrySummary[ec.correctedProject].count++;
      entrySummary[ec.correctedProject].total += ec.amount || 0;
      if (ec.period < entrySummary[ec.correctedProject].firstPeriod) entrySummary[ec.correctedProject].firstPeriod = ec.period;
      if (ec.period > entrySummary[ec.correctedProject].lastPeriod) entrySummary[ec.correctedProject].lastPeriod = ec.period;
    });

    // For each corrected project, check if it already exists in result
    Object.entries(entrySummary).forEach(([projName, stats]) => {
      const existing = result.find(p => p.name === projName);
      if (existing) {
        // Already exists (from named entries or project mapping), boost it
        existing.totalExTax = (existing.totalExTax || 0) + stats.total;
        existing.monthCount = (existing.monthCount || 0) + stats.count;
        existing.hasCorrectedEntries = true;
      } else {
        // New project name from entry corrections
        result.push({ name: projName, tasks: [], monthCount: stats.count, totalExTax: stats.total, correctedFromEntries: true, firstPeriod: stats.firstPeriod, lastPeriod: stats.lastPeriod });
      }
    });

    // Reduce totals from original generic projects that were corrected
    const correctedOriginals = {};
    c.entryCorrections.forEach(ec => {
      if (!correctedOriginals[ec.originalProject]) correctedOriginals[ec.originalProject] = { count: 0, total: 0 };
      correctedOriginals[ec.originalProject].count++;
      correctedOriginals[ec.originalProject].total += ec.amount || 0;
    });
    result = result.map(p => {
      const co = correctedOriginals[p.name];
      if (co && !p.correctedFromEntries && !p.originalName) {
        const remaining = (p.totalExTax || 0) - co.total;
        const remainingMonths = (p.monthCount || 0) - co.count;
        if (remaining <= 0 && remainingMonths <= 0) return null; // fully corrected away
        return { ...p, totalExTax: Math.max(0, remaining), monthCount: Math.max(0, remainingMonths) };
      }
      return p;
    }).filter(Boolean);
  }

  // Add manually added projects
  (c.addedProjects || []).forEach(name => {
    if (!result.find(p => p.name === name)) {
      result.push({ name, tasks: [], monthCount: 0, totalExTax: 0, added: true });
    }
  });

  return result;
}

function hasCorrections(vendorName) {
  const c = corrections[vendorName];
  return c && ((c.projectMappings && c.projectMappings.length > 0) || (c.addedProjects && c.addedProjects.length > 0) || (c.entryCorrections && c.entryCorrections.length > 0));
}

// 明細レベルの修正を適用して表示用プロジェクト名を返す
function getCorrectedEntryProject(vendorName, period, originalProject, amount) {
  const c = corrections[vendorName];
  if (!c || !c.entryCorrections) return null;
  const match = c.entryCorrections.find(ec =>
    ec.period === period && ec.originalProject === originalProject && Math.abs((ec.amount||0) - (amount||0)) < 10
  );
  return match ? match.correctedProject : null;
}

// 外注先の月別エントリーを取得
function getVendorEntries(vendorName) {
  const entries = [];
  monthlyData.forEach(m => {
    (m.entries || []).forEach(e => {
      if (e.vendor === vendorName) {
        entries.push({ period: m.period, project: e.project, task: e.task, amount: e.amountExTax, incTax: e.amountIncTax });
      }
    });
  });
  return entries.sort((a, b) => b.period.localeCompare(a.period));
}

// 汎用的な案件名かどうか（手入力が必要そうな名前）
function isGenericProject(name) {
  const generic = ['コーディング','デザイン','開発','運用','ディレクション','制作','その他','(不明)','コーディング・CMS実装'];
  return generic.includes(name);
}

// 同月に他の外注先が動いていた案件名を取得（サジェスト用）
function getSameMonthProjects(period, excludeVendor) {
  const projects = new Set();
  const m = monthlyData.find(d => d.period === period);
  if (!m) return [];
  (m.entries || []).forEach(e => {
    if (e.vendor !== excludeVendor && !isGenericProject(e.project)) {
      projects.add(e.project);
    }
  });
  return [...projects];
}

// ===== INIT =====
async function init() {
  const res = await fetch('vendor-data.json');
  const data = await res.json();
  allVendors = data.vendors || [];
  monthlyData = data.months || [];
  salesCrossRef = data.salesCrossRef || null;
  await loadCorrections();

  document.getElementById('summary').textContent =
    `${data.vendorCount}社の外注先 — データ更新: ${new Date(data.generatedAt).toLocaleDateString('ja-JP')}`;

  // Tab click handlers
  document.getElementById('tab-bar').addEventListener('click', e => {
    const btn = e.target.closest('button[data-tab]');
    if (!btn) return;
    currentTab = btn.dataset.tab;
    document.querySelectorAll('#tab-bar button').forEach(b => {
      b.className = b === btn
        ? 'px-4 py-3 text-sm cursor-pointer tab-active'
        : 'px-4 py-3 text-sm cursor-pointer tab-inactive';
    });
    render();
  });

  render();
}

function render() {
  const app = document.getElementById('app');
  switch (currentTab) {
    case 'search': renderSearchTab(app); break;
    case 'monthly': renderMonthlyTab(app); break;
    case 'crossref': renderCrossRefTab(app); break;
  }
}

// ===== TAB 1: SEARCH =====
function renderSearchTab(container) {
  // Build quick tags
  const projectCounts = {};
  allVendors.forEach(v => v.projects.forEach(p => {
    if (p.name !== '(不明)' && p.name !== '社内活用') projectCounts[p.name] = (projectCounts[p.name] || 0) + 1;
  }));
  const topProjects = Object.entries(projectCounts).sort((a, b) => b[1] - a[1]).slice(0, 12);
  const tagsHtml = topProjects.map(([name]) =>
    `<button class="quick-tag px-3 py-1 rounded-full text-xs font-medium bg-slate-100 text-slate-600 hover:bg-primary-50 hover:text-primary-600 cursor-pointer" data-q="${name}">${name}</button>`
  ).join('');

  container.innerHTML = `
    <div class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm mb-6">
      <div class="flex gap-4 items-end flex-wrap">
        <div class="flex-1 min-w-[240px] leading-normal">
          <label class="block text-sm font-medium text-slate-700 mb-1">キーワード検索</label>
          <input type="text" id="q" placeholder="外注先名・案件名・内容で検索..." class="w-full px-3 py-2 text-base border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500/50 caret-primary-500">
        </div>
        <div class="leading-normal">
          <label class="block text-sm font-medium text-slate-700 mb-1">区分</label>
          <select id="fType" class="appearance-none pl-3 pr-10 py-2 text-base border border-slate-300 rounded-lg bg-white">
            <option value="">すべて</option><option value="法人">法人</option><option value="個人">個人</option>
          </select>
        </div>
        <div class="leading-normal">
          <label class="block text-sm font-medium text-slate-700 mb-1">並び替え</label>
          <select id="fSort" class="appearance-none pl-3 pr-10 py-2 text-base border border-slate-300 rounded-lg bg-white">
            <option value="totalDesc">累計金額（大→小）</option><option value="totalAsc">累計金額（小→大）</option>
            <option value="recent">最終取引（新しい順）</option><option value="months">取引月数（多い順）</option><option value="name">名前順</option>
          </select>
        </div>
        <div class="leading-normal">
          <label class="block text-sm font-medium text-slate-700 mb-1">期間</label>
          <select id="fPeriod" class="appearance-none pl-3 pr-10 py-2 text-base border border-slate-300 rounded-lg bg-white">
            <option value="">全期間</option><option value="2026">2026年</option><option value="2025">2025年</option>
            <option value="2024">2024年</option><option value="2023">2023年</option><option value="2022">2022年以前</option>
          </select>
        </div>
      </div>
      <div class="mt-3 flex gap-2 flex-wrap">${tagsHtml}</div>
    </div>
    <div id="search-results" class="space-y-3"></div>
    <div id="search-count" class="text-sm text-slate-400 mt-4"></div>
  `;

  // Bind events
  const doFilter = () => filterVendors();
  document.getElementById('q').addEventListener('input', doFilter);
  document.getElementById('fType').addEventListener('change', doFilter);
  document.getElementById('fSort').addEventListener('change', doFilter);
  document.getElementById('fPeriod').addEventListener('change', doFilter);
  container.querySelectorAll('.quick-tag').forEach(btn => {
    btn.addEventListener('click', () => { document.getElementById('q').value = btn.dataset.q; doFilter(); });
  });

  filterVendors();
}

function filterVendors() {
  const query = (document.getElementById('q')?.value || '').trim().toLowerCase();
  const filterType = document.getElementById('fType')?.value || '';
  const sortBy = document.getElementById('fSort')?.value || 'totalDesc';
  const filterPeriod = document.getElementById('fPeriod')?.value || '';

  let results = allVendors.filter(v => {
    if (filterType && v.type !== filterType) return false;
    if (filterPeriod) {
      if (filterPeriod === '2022') {
        if (v.firstMonth > '2022-12') return false;
      } else {
        const hasYear = v.lastMonth.startsWith(filterPeriod) || v.firstMonth.startsWith(filterPeriod) ||
          (v.recentPayments || []).some(p => p.period.startsWith(filterPeriod));
        if (!hasYear) return false;
      }
    }
    if (query) {
      const s = [v.name, v.invoice, ...v.projects.map(p => p.name), ...v.projects.flatMap(p => p.tasks)].join(' ').toLowerCase();
      return s.includes(query);
    }
    return true;
  });

  switch (sortBy) {
    case 'totalDesc': results.sort((a, b) => b.totalExTax - a.totalExTax); break;
    case 'totalAsc': results.sort((a, b) => a.totalExTax - b.totalExTax); break;
    case 'recent': results.sort((a, b) => b.lastMonth.localeCompare(a.lastMonth)); break;
    case 'months': results.sort((a, b) => b.monthCount - a.monthCount); break;
    case 'name': results.sort((a, b) => a.name.localeCompare(b.name, 'ja')); break;
  }

  const max = 50;
  const out = document.getElementById('search-results');
  if (!results.length) { out.innerHTML = '<div class="text-center py-16 text-slate-400">該当なし</div>'; document.getElementById('search-count').textContent = ''; return; }

  const hl = (t) => {
    if (!query || !t) return String(t);
    const s = String(t);
    const idx = s.toLowerCase().indexOf(query);
    if (idx === -1) return s;
    return s.slice(0, idx) + '<span class="highlight">' + s.slice(idx, idx + query.length) + '</span>' + s.slice(idx + query.length);
  };

  let html = '';
  results.slice(0, max).forEach((v, i) => {
    const displayProjects = getDisplayProjects(v);
    const hasCor = hasCorrections(v.name);
    const tags = displayProjects.slice(0, 10).map(p => {
      const bgClass = p.correctedFromEntries ? 'bg-primary-100 text-primary-700' : p.originalName ? 'bg-primary-100 text-primary-700' : p.added ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-600';
      const periodLabel = p.firstPeriod && p.lastPeriod ? ' <span class="text-[10px] opacity-60">' + p.firstPeriod.substring(0,7) + '〜' + p.lastPeriod.substring(0,7) + '</span>' : (p.firstMonth && p.lastMonth ? ' <span class="text-[10px] opacity-60">' + p.firstMonth + '〜' + p.lastMonth + '</span>' : '');
      const originLabel = p.originalName ? ' <span class="text-primary-400 text-[10px]">← ' + p.originalName + '</span>' : '';
      return `<span class="px-2 py-0.5 rounded-full text-xs font-medium ${bgClass}">${hl(p.name)}${periodLabel}${originLabel}</span>`;
    }).join('');
    html += `
    <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
      <div class="p-4 cursor-pointer hover:bg-gray-50 transition-colors" onclick="document.getElementById('det${i}').classList.toggle('open')">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3 min-w-0">
            <div class="w-8 h-8 rounded-full ${v.type === '法人' ? 'bg-primary-50 text-primary-600' : 'bg-amber-50 text-amber-600'} inline-flex items-center justify-center flex-shrink-0 text-xs font-bold">${v.type === '法人' ? '法' : '個'}</div>
            <div class="min-w-0">
              <h3 class="font-bold text-slate-900 text-sm truncate">${hl(v.name)}${hasCor ? ' <span class="text-xs font-medium text-primary-500 bg-primary-50 px-1.5 py-0.5 rounded">修正済</span>' : ''}</h3>
              <p class="text-xs text-slate-400">${v.firstMonth} 〜 ${v.lastMonth} | ${v.monthCount}ヶ月${v.invoice ? ' | ' + v.invoice : ''}</p>
            </div>
          </div>
          <div class="flex items-center gap-3 flex-shrink-0 ml-4">
            <div class="text-right">
              <p class="font-bold text-slate-900 text-sm">${FMT(v.totalExTax)}</p>
              <p class="text-xs text-slate-400">税抜累計</p>
            </div>
            <button onclick="event.stopPropagation();openEditModal('${v.name.replace(/'/g, "\\'")}')" class="w-8 h-8 inline-flex items-center justify-center rounded-lg border border-slate-200 hover:bg-primary-50 hover:border-primary-300 cursor-pointer text-slate-400 hover:text-primary-500 flex-shrink-0" aria-label="案件紐づけ編集" title="案件紐づけ編集">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
            </button>
          </div>
        </div>
        <div class="flex flex-wrap gap-1.5 mt-2">${tags}</div>
      </div>
      <div class="detail-panel" id="det${i}">
        <div class="border-t border-slate-100 px-4 py-4 bg-gray-50">
          <div class="grid grid-cols-3 gap-6">
            <div class="col-span-2">
              <h4 class="text-xs font-bold text-slate-500 uppercase mb-2">案件別内訳</h4>
              <table class="w-full text-sm"><thead><tr class="border-b border-slate-200">
                <th scope="col" class="text-left py-2 text-xs text-slate-500">案件</th>
                <th scope="col" class="text-left py-2 text-xs text-slate-500">内容</th>
                <th scope="col" class="text-right py-2 text-xs text-slate-500">月数</th>
                <th scope="col" class="text-right py-2 text-xs text-slate-500">累計</th>
              </tr></thead><tbody>
              ${displayProjects.map(p => `<tr class="border-b border-slate-100"><td class="py-2">${hl(p.name)}${p.originalName ? ' <span class="text-xs text-primary-400">← ' + p.originalName + '</span>' : ''}${p.added ? ' <span class="text-xs text-emerald-400">手動追加</span>' : ''}</td><td class="py-2 text-xs text-body">${(p.tasks || []).join(', ')}</td><td class="py-2 text-right text-slate-500">${p.monthCount || 0}</td><td class="py-2 text-right font-medium">${FMT(p.totalExTax)}</td></tr>`).join('')}
              </tbody></table>
            </div>
            <div>
              <h4 class="text-xs font-bold text-slate-500 uppercase mb-2">連絡先</h4>
              ${v.phone ? `<p class="text-xs text-slate-400">電話</p><p class="text-sm mb-2">${v.phone}</p>` : ''}
              ${v.address ? `<p class="text-xs text-slate-400">住所</p><p class="text-xs mb-2">${v.address}</p>` : ''}
              ${v.bankInfo ? `<p class="text-xs text-slate-400">振込先</p><p class="text-xs mb-2">${v.bankInfo}</p>` : ''}
              ${!v.phone && !v.address && !v.bankInfo ? '<p class="text-xs text-slate-400">登録なし</p>' : ''}
              ${(v.recentPayments || []).length ? `<h4 class="text-xs font-bold text-slate-500 uppercase mt-4 mb-1">直近支払い</h4>${v.recentPayments.slice(0,6).map(p=>`<div class="flex justify-between text-xs"><span class="text-slate-500">${p.period}</span><span>${FMT(p.amountExTax)}</span></div>`).join('')}` : ''}
            </div>
          </div>
        </div>
      </div>
    </div>`;
  });
  out.innerHTML = html;
  document.getElementById('search-count').textContent = results.length <= max ? results.length + '件' : `${results.length}件中 ${max}件表示`;
}

// ===== TAB 2: MONTHLY =====
function renderMonthlyTab(container) {
  console.log('renderMonthlyTab called, monthlyData.length:', monthlyData.length);

  if (!monthlyData.length) {
    container.innerHTML = '<div class="text-center py-16 text-slate-400">月別データがありません</div>';
    return;
  }

  const options = monthlyData.slice(0, 36).map((m, i) =>
    '<option value="' + m.period + '"' + (i === 0 ? ' selected' : '') + '>' + m.period.replace('-', '年') + '月</option>'
  ).join('');

  // Build fiscal year chart (7月〜6月)
  var fyOptions = '<option value="2025-07">第17期（2025.7〜2026.6）</option>' +
    '<option value="2024-07">第16期（2024.7〜2025.6）</option>' +
    '<option value="2023-07">第15期（2023.7〜2024.6）</option>' +
    '<option value="2022-07">第14期（2022.7〜2023.6）</option>';

  container.innerHTML =

function renderFYChart() {
  var startPeriod = document.getElementById('fySel')?.value || '2025-07';
  var out = document.getElementById('fy-chart');
  if (!out) return;

  // Generate 12 months from start
  var startYear = parseInt(startPeriod.split('-')[0]);
  var startMonth = parseInt(startPeriod.split('-')[1]);
  var months12 = [];
  for (var i = 0; i < 12; i++) {
    var mm = startMonth + i;
    var yy = startYear;
    if (mm > 12) { mm -= 12; yy += 1; }
    months12.push(yy + '-' + String(mm).padStart(2, '0'));
  }

  // Gather data
  var chartData = months12.map(function(p) {
    var md = monthlyData.find(function(d) { return d.period === p; });
    return {
      period: p,
      label: p.split('-')[1].replace(/^0/, '') + '月',
      sales: md && md.salesThousand ? md.salesThousand * 1000 : 0, // convert to 円
      cost: md ? md.totalExTax : 0,
      ratio: md && md.costRatio != null ? md.costRatio : null,
    };
  });

  var maxVal = Math.max.apply(null, chartData.map(function(d) { return Math.max(d.sales, d.cost); }));
  if (maxVal === 0) maxVal = 1;

  // Totals
  var totalSales = chartData.reduce(function(s, d) { return s + d.sales; }, 0);
  var totalCost = chartData.reduce(function(s, d) { return s + d.cost; }, 0);
  var totalRatio = totalSales > 0 ? totalCost / totalSales : 0;
  var totalRatioColor = totalRatio <= 0.3 ? 'text-emerald-600' : totalRatio <= 0.5 ? 'text-amber-600' : 'text-red-600';

  var html = '';

  // Summary row
  html += '<div class="flex gap-6 mb-5 text-sm">' +
    '<div><span class="text-slate-500">年間売上:</span> <strong>' + FMT(totalSales) + '</strong></div>' +
    '<div><span class="text-slate-500">年間外注費:</span> <strong>' + FMT(totalCost) + '</strong></div>' +
    '<div><span class="text-slate-500">年間利益:</span> <strong>' + FMT(totalSales - totalCost) + '</strong></div>' +
    '<div><span class="text-slate-500">外注費率:</span> <strong class="' + totalRatioColor + '">' + (totalRatio * 100).toFixed(1) + '%</strong></div>' +
  '</div>';

  // Legend
  html += '<div class="flex gap-4 mb-3 text-xs text-slate-500">' +
    '<span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-primary-400 inline-block"></span> 売上</span>' +
    '<span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-red-300 inline-block"></span> 外注費</span>' +
    '<span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-slate-600 inline-block"></span> 外注費率</span>' +
  '</div>';

  // Chart
  html += '<div class="flex items-end gap-2" style="height:200px">';
  chartData.forEach(function(d) {
    var salesH = maxVal > 0 ? (d.sales / maxVal * 170) : 0;
    var costH = maxVal > 0 ? (d.cost / maxVal * 170) : 0;
    var ratioText = d.ratio != null ? (d.ratio * 100).toFixed(0) + '%' : '';
    var ratioColor = d.ratio == null ? '#cbd5e1' : d.ratio <= 0.3 ? '#059669' : d.ratio <= 0.5 ? '#d97706' : '#dc2626';

    html += '<div class="flex-1 flex flex-col items-center">';

    // Ratio dot
    if (ratioText) {
      html += '<div class="text-xs font-medium mb-1" style="color:' + ratioColor + '">' + ratioText + '</div>';
    } else {
      html += '<div class="text-xs mb-1">&nbsp;</div>';
    }

    // Bars
    html += '<div class="flex gap-0.5 items-end" style="height:170px">' +
      '<div class="w-5 rounded-t bg-primary-400 transition-all" style="height:' + Math.max(salesH, 2) + 'px" title="売上: ' + FMT(d.sales) + '"></div>' +
      '<div class="w-5 rounded-t bg-red-300 transition-all" style="height:' + Math.max(costH, 2) + 'px" title="外注: ' + FMT(d.cost) + '"></div>' +
    '</div>';

    // Label
    html += '<div class="text-xs text-slate-500 mt-2">' + d.label + '</div>';
    html += '</div>';
  });
  html += '</div>';

  out.innerHTML = html;
}

function renderCrossRefTab(container) {
  if (!salesCrossRef) {
    container.innerHTML = '<div class="text-center py-16 text-slate-400">売上データが見つかりません。<br><code>node generate-sales-data.js</code> を先に実行してください。</div>';
    return;
  }

  var sb = salesCrossRef.salesByClient;
  var pm = salesCrossRef.projectToSalesMap;
  var currentMonths = monthlyData.filter(function(m) { return m.period >= '2025-07'; });

  // Aggregate vendor costs by client AND by vendor project
  var costByClient = {};
  currentMonths.forEach(function(m) {
    m.entries.forEach(function(e) {
      var client = pm[e.project];
      if (!client) return;
      if (!costByClient[client]) costByClient[client] = { cost: 0, vendorProjects: {}, vendors: {} };
      costByClient[client].cost += e.amountExTax;
      // By vendor project name
      if (!costByClient[client].vendorProjects[e.project]) costByClient[client].vendorProjects[e.project] = { cost: 0, vendors: {} };
      costByClient[client].vendorProjects[e.project].cost += e.amountExTax;
      // By vendor
      var vKey = e.vendor + '|' + e.project + '|' + e.task;
      if (!costByClient[client].vendors[vKey]) costByClient[client].vendors[vKey] = { vendor: e.vendor, project: e.project, task: e.task, cost: 0 };
      costByClient[client].vendors[vKey].cost += e.amountExTax;
    });
  });

  // Build rows
  var rows = [];
  var allClients = new Set(Object.keys(sb).concat(Object.keys(costByClient)));
  allClients.forEach(function(client) {
    var sales = sb[client] ? sb[client].sales : 0;
    var actions = sb[client] ? (sb[client].actions || []) : [];
    var cost = costByClient[client] ? costByClient[client].cost : 0;
    var profit = (sales * 1000) - cost;
    var margin = sales > 0 ? profit / (sales * 1000) : null;
    var vendorDetail = costByClient[client] ? Object.values(costByClient[client].vendors).sort(function(a,b) { return b.cost - a.cost; }) : [];
    if (sales > 0 || cost > 0) rows.push({ client: client, sales: sales, actions: actions, cost: cost, profit: profit, margin: margin, vendorDetail: vendorDetail });
  });
  rows.sort(function(a, b) { return (b.sales * 1000) - (a.sales * 1000); });

  var html = '<div class="bg-white rounded-xl border border-slate-200 p-5 shadow-sm mb-6">' +
    '<p class="text-sm text-body">売上データ（' + salesCrossRef.period + '）と外注費（2025年7月〜）を案件名で照合。クリックで詳細展開。</p>' +
    '<p class="text-xs text-slate-400 mt-1">売上=千円単位 / 外注費=円単位 / 利益=売上-外注費（概算）</p>' +
  '</div><div class="space-y-3">';

  rows.forEach(function(r, idx) {
    var mc = r.margin === null ? 'text-slate-300' : r.margin >= 0.6 ? 'text-emerald-600' : r.margin >= 0.5 ? 'text-amber-600' : 'text-red-600';
    var marginText = r.margin != null ? (r.margin * 100).toFixed(1) + '%' : '-';

    html += '<div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">';

    // Header row (clickable)
    html += '<div class="p-4 cursor-pointer hover:bg-gray-50 transition-colors" onclick="document.getElementById(\'cr' + idx + '\').classList.toggle(\'open\')">' +
      '<div class="flex items-center justify-between">' +
        '<div class="flex items-center gap-3">' +
          '<h3 class="font-bold text-slate-900 text-sm">' + r.client + '</h3>' +
          '<span class="text-xs text-slate-400">' + (r.actions.length || 0) + '案件</span>' +
        '</div>' +
        '<div class="flex items-center gap-6 text-sm">' +
          '<div class="text-right"><span class="text-xs text-slate-400 mr-2">売上</span><strong>' + (r.sales ? FMT(r.sales) + '千' : '-') + '</strong></div>' +
          '<div class="text-right"><span class="text-xs text-slate-400 mr-2">外注費</span><strong class="text-slate-700">' + (r.cost ? FMT(r.cost) : '-') + '</strong></div>' +
          '<div class="text-right"><span class="text-xs text-slate-400 mr-2">利益率</span><strong class="' + mc + '">' + marginText + '</strong></div>' +
        '</div>' +
      '</div>' +
    '</div>';

    // Detail panel
    html += '<div class="detail-panel" id="cr' + idx + '">' +
      '<div class="border-t border-slate-100 px-4 py-4 bg-gray-50">' +
        '<div class="grid grid-cols-1 sm:grid-cols-2 gap-6">';

    // Left: sales actions
    html += '<div>' +
      '<h4 class="text-xs font-bold text-slate-500 uppercase mb-2">売上内訳（案件別）</h4>';
    if (r.actions.length > 0) {
      html += '<table class="w-full text-sm"><thead><tr class="border-b border-slate-200">' +
        '<th scope="col" class="text-left py-2 text-xs text-slate-500">案件</th>' +
        '<th scope="col" class="text-right py-2 text-xs text-slate-500">売上（千円）</th>' +
        '<th scope="col" class="text-right py-2 text-xs text-slate-500">ヨミ</th>' +
        '</tr></thead><tbody>';
      r.actions.forEach(function(a) {
        html += '<tr class="border-b border-slate-100">' +
          '<td class="py-1.5 text-slate-900">' + a.action + '</td>' +
          '<td class="py-1.5 text-right font-medium">' + (a.sales ? FMT(a.sales) : '-') + '</td>' +
          '<td class="py-1.5 text-right text-emerald-600">' + (a.yomi ? FMT(a.yomi) : '-') + '</td>' +
        '</tr>';
      });
      html += '</tbody></table>';
    } else {
      html += '<p class="text-xs text-slate-400">案件詳細なし</p>';
    }
    html += '</div>';

    // Right: vendor costs
    html += '<div>' +
      '<h4 class="text-xs font-bold text-slate-500 uppercase mb-2">外注費内訳</h4>';
    if (r.vendorDetail.length > 0) {
      html += '<table class="w-full text-sm"><thead><tr class="border-b border-slate-200">' +
        '<th scope="col" class="text-left py-2 text-xs text-slate-500">外注先</th>' +
        '<th scope="col" class="text-left py-2 text-xs text-slate-500">内容</th>' +
        '<th scope="col" class="text-right py-2 text-xs text-slate-500">金額（税抜）</th>' +
        '</tr></thead><tbody>';
      r.vendorDetail.forEach(function(v) {
        html += '<tr class="border-b border-slate-100">' +
          '<td class="py-1.5 text-slate-900">' + v.vendor + '</td>' +
          '<td class="py-1.5 text-xs text-body">' + v.task + '</td>' +
          '<td class="py-1.5 text-right font-medium">' + FMT(v.cost) + '</td>' +
        '</tr>';
      });
      html += '</tbody></table>';
    } else {
      html += '<p class="text-xs text-slate-400">外注データなし（未マッチ）</p>';
    }
    html += '</div>';

    html += '</div></div></div></div>';
  });

  html += '</div>';
  container.innerHTML = html;
}

    html += '<svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>';
    html += '</div>';
    // Default: show newest year, hide older
    html += '<div class="space-y-2' + (year !== years[0] ? ' hidden' : '') + '">';

    yearEntries.forEach((e, idx) => {
      const corrected = getCorrectedEntryProject(v.name, e.period, e.project, e.amount) || '';
      const sameMonthProjects = getSameMonthProjects(e.period, v.name);
      const entryKey = e.period + '_' + e.project + '_' + (e.amount || 0);

      html += '<div class="p-3 rounded-lg border ' + (corrected ? 'border-primary-200 bg-primary-50/30' : 'border-slate-200') + '">';
      html += '<div class="flex items-center gap-3 mb-2">';
      html += '<span class="text-xs font-medium text-slate-600 w-16 flex-shrink-0">' + e.period.substring(5) + '月</span>';
      html += '<span class="text-xs text-slate-400 flex-shrink-0">' + FMT(e.amount) + '</span>';
      html += '<span class="text-xs text-slate-300 flex-1 truncate">' + (e.project || '') + '</span>';
      if (corrected) html += '<span class="text-xs text-primary-500 font-medium flex-shrink-0">→ ' + corrected + '</span>';
      html += '</div>';
      html += '<input type="text" data-entry-key="' + entryKey.replace(/"/g, '&quot;') + '" data-period="' + e.period + '" data-original="' + (e.project || '').replace(/"/g, '&quot;') + '" data-amount="' + (e.amount || 0) + '" value="' + corrected.replace(/"/g, '&quot;') + '" placeholder="正しい案件名を入力..." class="entry-correction-input w-full px-3 py-1.5 text-sm border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500/50">';

      // Same month suggestions
      if (sameMonthProjects.length && !corrected) {
        html += '<div class="flex flex-wrap gap-1 mt-1.5">';
        html += '<span class="text-[10px] text-slate-400">同月の案件:</span>';
        sameMonthProjects.slice(0, 6).forEach(p => {
          html += '<button onclick="this.closest(\'div\').previousElementSibling.value=\'' + p.replace(/'/g, "\\'") + '\';this.closest(\'div\').previousElementSibling.classList.add(\'border-primary-400\')" class="px-1.5 py-0.5 rounded text-[10px] bg-slate-100 text-slate-600 hover:bg-primary-100 hover:text-primary-600 cursor-pointer">' + p + '</button>';
        });
        html += '</div>';
      }
      html += '</div>';
    });

    html += '</div></div>';
  });

  return html;
}

function renderProjectsTab(v, c) {
  const projects = v.projects || [];

  let html = '<p class="text-xs text-slate-500 mb-4">案件カテゴリ単位で一括修正（例: 全「コーディング」→「リバサポ」）。明細レベルの修正が優先されます。</p>';

  html += '<div class="space-y-3 mb-4" id="editProjectList">';
  projects.forEach((p, i) => {
    const mapping = (c.projectMappings || []).find(m => m.original === p.name);
    const corrected = mapping ? mapping.corrected : '';
    const isModified = !!corrected;
    html += '<div class="flex items-center gap-2 p-3 rounded-lg border ' + (isModified ? 'border-primary-200 bg-primary-50/30' : 'border-slate-200') + '">';
    html += '<div class="flex-1 min-w-0">';
    html += '<div class="text-xs text-slate-400 mb-1">元の名前: ' + p.name + ' <span class="text-slate-300">(' + FMT(p.totalExTax) + ' / ' + p.monthCount + 'ヶ月)</span></div>';
    html += '<input type="text" data-original="' + p.name.replace(/"/g, '&quot;') + '" value="' + (corrected || p.name).replace(/"/g, '&quot;') + '" placeholder="修正後の案件名" class="edit-project-input w-full px-3 py-1.5 text-sm border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500/50">';
    html += '</div>';
    if (isModified) html += '<span class="text-xs text-primary-500 font-medium flex-shrink-0">修正済</span>';
    html += '</div>';
  });
  html += '</div>';

  html += '<div class="mb-4" id="addedProjectsContainer">';
  const added = c.addedProjects || [];
  added.forEach(name => {
    html += '<div class="flex items-center gap-2 mb-2"><input type="text" class="added-project-input flex-1 px-3 py-1.5 text-sm border border-emerald-300 rounded-lg bg-emerald-50" value="' + name.replace(/"/g, '&quot;') + '" placeholder="追加案件名"><button onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-600 cursor-pointer text-sm">&times;</button></div>';
  });
  html += '</div>';
  html += '<button onclick="addProjectField()" class="inline-flex items-center gap-1 text-sm text-primary-500 hover:text-primary-700 cursor-pointer">+ 案件を手動追加</button>';

  return html;
}

function closeEditModal() {
  document.getElementById('editModal').style.display = 'none';
  editingVendor = null;
}

function addProjectField() {
  const container = document.getElementById('addedProjectsContainer');
  const div = document.createElement('div');
  div.className = 'flex items-center gap-2 mb-2';
  div.innerHTML = '<input type="text" class="added-project-input flex-1 px-3 py-1.5 text-sm border border-emerald-300 rounded-lg bg-emerald-50" placeholder="追加案件名"><button onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-600 cursor-pointer text-sm">&times;</button>';
  container.appendChild(div);
}

async function saveEditModal() {
  if (!editingVendor) return;

  // Collect project-level mappings
  const projectMappings = [];
  document.querySelectorAll('.edit-project-input').forEach(input => {
    const original = input.dataset.original;
    const corrected = input.value.trim();
    if (corrected && corrected !== original) {
      projectMappings.push({ original, corrected });
    }
  });

  const addedProjects = [];
  document.querySelectorAll('.added-project-input').forEach(input => {
    const val = input.value.trim();
    if (val) addedProjects.push(val);
  });

  // Collect entry-level corrections
  const entryCorrections = [];
  document.querySelectorAll('.entry-correction-input').forEach(input => {
    const val = input.value.trim();
    if (val) {
      entryCorrections.push({
        period: input.dataset.period,
        originalProject: input.dataset.original,
        amount: parseFloat(input.dataset.amount) || 0,
        correctedProject: val
      });
    }
  });

  // Also keep existing entry corrections that weren't shown (different tab)
  const existing = corrections[editingVendor.name] || {};
  const existingEntries = existing.entryCorrections || [];
  // Merge: current UI entries override, keep others
  const shownKeys = new Set();
  document.querySelectorAll('.entry-correction-input').forEach(input => {
    shownKeys.add(input.dataset.period + '_' + input.dataset.original + '_' + input.dataset.amount);
  });
  existingEntries.forEach(ec => {
    const key = ec.period + '_' + ec.originalProject + '_' + ec.amount;
    if (!shownKeys.has(key) && ec.correctedProject) {
      entryCorrections.push(ec);
    }
  });

  const note = document.getElementById('editNote').value.trim();

  const correction = { projectMappings, addedProjects, entryCorrections, note };

  const hasData = projectMappings.length > 0 || addedProjects.length > 0 || entryCorrections.length > 0 || note;
  if (!hasData) {
    delete corrections[editingVendor.name];
    await fetch('/api/corrections/' + encodeURIComponent(editingVendor.name), { method: 'DELETE' });
  } else {
    await saveVendorCorrection(editingVendor.name, correction);
  }

  closeEditModal();
  showToast('保存しました');
  render();
}

async function resetCorrections() {
  if (!editingVendor) return;
  if (!confirm(editingVendor.name + ' の修正をリセットしますか？')) return;
  delete corrections[editingVendor.name];
  await fetch('/api/corrections/' + encodeURIComponent(editingVendor.name), { method: 'DELETE' });
  closeEditModal();
  showToast('リセットしました');
  render();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.transform = 'translateY(0)';
  t.style.opacity = '1';
  setTimeout(() => { t.style.transform = 'translateY(80px)'; t.style.opacity = '0'; }, 2000);
}

init().catch(e => {
  document.getElementById('app').innerHTML = `<p class="text-red-500 text-center py-20">エラー: ${e.message}</p>`;
});
</script>
