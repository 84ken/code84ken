<!-- ===== Project Modal ===== -->
<div id="pm" class="fixed inset-0 bg-black/30 z-50 flex items-center justify-center" style="display:none">
  <div class="bg-white rounded-xl shadow-xl w-full max-w-2xl p-6 mx-4 max-h-[85vh] overflow-y-auto">
    <h2 class="text-lg font-bold text-slate-900 mb-4" id="pm-title">プロジェクト登録</h2>
    <form id="pm-form" class="space-y-4">
      <input type="hidden" id="pm-id">

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="leading-normal">
          <label class="block text-sm font-medium text-slate-700 mb-1">プロジェクト名 *</label>
          <input type="text" id="pm-name" required placeholder="リバサポ" class="w-full px-3 py-2 text-base border border-slate-300 rounded-lg">

        <div class="leading-normal">
          <label class="block text-sm font-medium text-slate-700 mb-1">クライアント</label>
          <input type="text" id="pm-client" placeholder="マクドナルド" class="w-full px-3 py-2 text-base border border-slate-300 rounded-lg">
        </div>
      </div>

      <div class="leading-normal">
        <label class="block text-sm font-medium text-slate-700 mb-1">請求先 <span class="text-xs text-slate-400 font-normal">（空欄ならクライアントに請求）</span></label>
        <input type="text" id="pm-billing" placeholder="株式会社ゆめみ" class="w-full px-3 py-2 text-base border border-slate-300 rounded-lg">
      </div>

      <div class="leading-normal">
        <label class="block text-sm font-medium text-slate-700 mb-1">概要</label>
        <textarea id="pm-desc" rows="2" placeholder="プロジェクトの概要・目的" class="w-full px-3 py-2 text-base border border-slate-300 rounded-lg"></textarea>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <div class="leading-normal">
          <label class="block text-sm font-medium text-slate-700 mb-1">担当</label>
          <input type="text" id="pm-manager" placeholder="橋本 / 岡永" class="w-full px-3 py-2 text-base border border-slate-300 rounded-lg">
        </div>
        <div class="leading-normal">
          <label class="block text-sm font-medium text-slate-700 mb-1">開始</label>
          <input type="month" id="pm-start" class="w-full px-3 py-2 text-base border border-slate-300 rounded-lg">
        </div>
        <div class="leading-normal">
          <label class="block text-sm font-medium text-slate-700 mb-1">終了</label>
          <input type="month" id="pm-end" class="w-full px-3 py-2 text-base border border-slate-300 rounded-lg">
        </div>
      </div>

      <div class="leading-normal">
        <label class="block text-sm font-medium text-slate-700 mb-1">ステークホルダー</label>
        <input type="text" id="pm-stakeholders" placeholder="県庁スポーツ振興課 田中氏、横瀬町 浅見氏" class="w-full px-3 py-2 text-base border border-slate-300 rounded-lg">
      </div>

      <div class="leading-normal">
        <label class="block text-sm font-medium text-slate-700 mb-1">納品物</label>
        <textarea id="pm-deliverables" rows="2" placeholder="WEBサイト更新、SNS運用、報告書 等" class="w-full px-3 py-2 text-base border border-slate-300 rounded-lg"></textarea>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="leading-normal">
          <label class="block text-sm font-medium text-slate-700 mb-1">契約金額（税抜・円）</label>
          <input type="number" id="pm-contract" placeholder="7957576" class="w-full px-3 py-2 text-base border border-slate-300 rounded-lg" oninput="showTaxIncluded()">
          <p class="text-xs text-slate-400 mt-1" id="pm-tax-display"></p>
        </div>
        <div class="leading-normal">
          <label class="block text-sm font-medium text-slate-700 mb-1">契約金額（税込・円）から入力</label>
          <input type="number" id="pm-contract-inc" placeholder="8753334" class="w-full px-3 py-2 text-base border border-slate-300 rounded-lg" oninput="calcExTax()">
          <p class="text-xs text-slate-400 mt-1">税込で入力すると税抜に自動変換</p>
        </div>
      </div>

      <div class="leading-normal">
        <label class="block text-sm font-medium text-slate-700 mb-1">リスク・注意事項</label>
        <textarea id="pm-risks" rows="2" placeholder="年度末集中、外注先の稼働確保 等" class="w-full px-3 py-2 text-base border border-slate-300 rounded-lg"></textarea>

<script>
var FMT = function(n) { return n ? '¥' + Math.round(n).toLocaleString() : '¥0'; };
var el = function(id) { return document.getElementById(id); };
var D = { projects: [] };
var view = 'active';
var groupMode = true;
var NOW = (function() { var d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0'); })();

// 期の計算（7月〜6月）
function getFiscalYear(ym) {
  var parts = ym.split('-'); var y = parseInt(parts[0]); var m = parseInt(parts[1]);
  return m >= 7 ? y : y - 1; // 7月始まり
}
function getFiscalHalf(ym) {
  var m = parseInt(ym.split('-')[1]);
  return m >= 7 ? '前期' : '後期'; // 7-12=前期, 1-6=後期
}
function getCurrentFiscalYear() {
  var d = new Date(); return d.getMonth() >= 6 ? d.getFullYear() : d.getFullYear() - 1;
}
function getFiscalMonths(fy) {
  var months = [];
  for (var m = 7; m <= 12; m++) months.push(fy + '-' + String(m).padStart(2,'0'));
  for (var m = 1; m <= 6; m++) months.push((fy+1) + '-' + String(m).padStart(2,'0'));
  return months;
}

function gid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ===== VENDOR AUTOCOMPLETE =====
var vendorDB = []; // { name, invoice, type, bankInfo, lastMonth, projects[] }

async function loadVendorDB() {
  try {
    var r = await (await fetch('vendor-data.json')).json();
    vendorDB = (r.vendors || []).map(function(v) {
      return {
        name: v.name,
        invoice: v.invoice || '',
        type: v.type || '',
        bankInfo: v.bankInfo || '',
        lastMonth: v.lastMonth || '',
        projects: (v.projects || []).map(function(p){ return p.name; })
      };
    });
  } catch(e) { /* vendor-data.json not available */ }
}

function vendorSuggest(val) {
  var box = el('vm-suggest');
  if (!val || val.length < 1) { box.style.display = 'none'; return; }
  var q = val.toLowerCase();
  var hits = vendorDB.filter(function(v) {
    return v.name.toLowerCase().indexOf(q) >= 0;
  }).slice(0, 15);

  if (!hits.length) { box.style.display = 'none'; return; }

  box.innerHTML = hits.map(function(v) {
    var projs = v.projects.slice(0, 3).join(', ');
    return '<div onclick="pickVendor(\'' + v.name.replace(/'/g, "\\'") + '\')" style="padding:8px 12px;cursor:pointer;border-bottom:1px solid #f1f5f9;font-size:13px;" onmouseover="this.style.background=\'#f8fafc\'" onmouseout="this.style.background=\'#fff\'">' +
      '<div style="font-weight:500;color:#1e293b;">' + v.name + '</div>' +
      '<div style="font-size:11px;color:#94a3b8;">' +
        (v.type ? v.type + ' ' : '') +
        (v.invoice ? 'T:' + v.invoice.substring(0,8) + '… ' : '') +
        (projs ? '案件: ' + projs : '') +
      '</div></div>';
  }).join('');
  box.style.display = 'block';
}

function pickVendor(name) {
  el('vm-vendor').value = name;
  el('vm-suggest').style.display = 'none';
}

// Close suggest on click outside
document.addEventListener('click', function(e) {
  if (!e.target.closest('#vm-suggest') && e.target.id !== 'vm-vendor') {
    el('vm-suggest').style.display = 'none';
  }
});

// 契約金額（税抜）→ 税込表示
function showTaxIncluded() {
  var a = parseFloat(el('pm-contract').value);
  el('pm-tax-display').textContent = a ? '税込: ¥' + Math.round(a * 1.1).toLocaleString() : '';
  el('pm-contract-inc').value = a ? Math.round(a * 1.1) : '';
}
// 税込入力 → 税抜に変換
function calcExTax() {
  var a = parseFloat(el('pm-contract-inc').value);
  if (a) {
    el('pm-contract').value = Math.round(a / 1.1);
    el('pm-tax-display').textContent = '税込: ¥' + Math.round(a).toLocaleString();
  }
}

var _taxDir = ''; // 'ex' or 'inc' - which field was last edited
function autoTax() {
  _taxDir = 'ex';
  var a = parseFloat(el('vm-amount').value);
  if (a) el('vm-tax').value = Math.round(a * 1.1);
}
function autoExTax() {
  _taxDir = 'inc';
  var a = parseFloat(el('vm-tax').value);
  if (a) el('vm-amount').value = Math.round(a / 1.1);
}

// ===== LOAD / SAVE =====
async function load() {
  try {
    var resp = await fetch('/api/memos');
    if (!resp.ok) throw new Error();
    var r = await resp.json();
  } catch(e) {
    var r = await (await fetch('vendor-memos.json')).json();
  }
  D = r.projects ? r : { projects: [] };
  render();
}
async function save() {
  try {
    await fetch('/api/memos', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(D) });
  } catch(e) { /* HQ版ではAPIなし */ }
}

// ===== RENDER =====
var monthFilter = ''; // 請求月フィルター

function render() {
  renderKPI();
  renderFilters();
  renderProjects();
}

function renderKPI() {
  var ts = 0, ty = 0, tc = 0, tp = 0, al = 0;
  D.projects.forEach(function(p) {
    if (p.status === 'proposal') {
      ty += p.contractAmount || 0; // 提案中 = ヨミ
    } else {
      ts += p.contractAmount || 0; // 進行中 = 確定
    }
    (p.vendors||[]).forEach(function(v) {
      var a = v.amountTax || v.amount || 0;
      tc += a;
      if (v.status === 'planned') { tp += a; if (v.expectedMonth && v.expectedMonth < NOW) al++; }
    });
  });
  var activeCount = D.projects.filter(function(p){return p.status==='active'}).length;
  var proposalCount = D.projects.filter(function(p){return p.status==='proposal'}).length;
  el('kpi').innerHTML =
    kpiCard('プロジェクト', D.projects.length, '進行中 ' + activeCount + ' / 提案中 ' + proposalCount) +
    kpiCard('確定売上', FMT(ts), ty > 0 ? '<span class="text-violet-500">ヨミ ' + FMT(ty) + '</span>' : '') +
    kpiCard('外注費 / 粗利', FMT(tc), '<span class="' + (ts-tc>=0?'text-emerald-600':'text-red-600') + '">粗利 ' + FMT(ts-tc) + '</span>') +
    kpiCard('未払い予定', FMT(tp), al > 0 ? '<span class="text-red-500 font-medium">⚠ '+al+'件超過</span>' : '');
}
function renderMonthlySummary_unused() { // 未使用
  var fy = getCurrentFiscalYear();
  var months = getFiscalMonths(fy);
  var period = '第' + (fy - 2010 + 1) + '期（' + fy + '.7〜' + (fy+1) + '.6）';

  // 月別集計: 請求（契約からの按分）と外注費
  var monthData = {};
  months.forEach(function(m) { monthData[m] = { sales: 0, vendorCost: 0, projects: [] }; });

  D.projects.forEach(function(p) {
    // 外注費を請求月で集計
    (p.vendors || []).forEach(function(v) {
      var m = v.expectedMonth;
      if (m && monthData[m]) {
        monthData[m].vendorCost += v.amountTax || v.amount || 0;
        if (monthData[m].projects.indexOf(p.name) < 0) monthData[m].projects.push(p.name);
      }
    });

    // 契約金額を期間で按分（スケジュールがある場合）
    if (p.contractAmount && p.scheduleStart && p.scheduleEnd) {
      var start = p.scheduleStart, end = p.scheduleEnd;
      var spanMonths = [];
      months.forEach(function(m) { if (m >= start && m <= end) spanMonths.push(m); });
      if (spanMonths.length > 0) {
        var perMonth = Math.round(p.contractAmount / spanMonths.length);
        spanMonths.forEach(function(m) {
          if (monthData[m]) {
            monthData[m].sales += perMonth;
            if (monthData[m].projects.indexOf(p.name) < 0) monthData[m].projects.push(p.name);
          }
        });
      }
    }
  });

  // 前期・後期の合計
  var firstHalf = { sales: 0, cost: 0 };
  var secondHalf = { sales: 0, cost: 0 };
  months.forEach(function(m) {
    var d = monthData[m];
    if (getFiscalHalf(m) === '前期') { firstHalf.sales += d.sales; firstHalf.cost += d.vendorCost; }
    else { secondHalf.sales += d.sales; secondHalf.cost += d.vendorCost; }
  });

  var h = '<div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">';
  h += '<div class="px-4 sm:px-6 py-3 border-b border-slate-200 bg-gray-50 flex flex-wrap items-center justify-between gap-2">';
  h += '<h2 class="text-sm font-bold text-slate-900">月別サマリー <span class="text-xs font-normal text-slate-400">' + period + '</span></h2>';
  h += '<div class="flex gap-3 text-xs">';
  h += '<span class="text-slate-500">前期 売上' + FMT(firstHalf.sales) + ' / 外注' + FMT(firstHalf.cost) + '</span>';
  h += '<span class="text-slate-500">後期 売上' + FMT(secondHalf.sales) + ' / 外注' + FMT(secondHalf.cost) + '</span>';
  h += '</div></div>';

  h += '<div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="border-b border-slate-200 bg-gray-50">';
  h += '<th scope="col" class="text-left py-2 px-3 text-xs font-medium text-slate-500">月</th>';
  h += '<th scope="col" class="text-right py-2 px-3 text-xs font-medium text-slate-500">売上（税抜）</th>';
  h += '<th scope="col" class="text-right py-2 px-3 text-xs font-medium text-slate-500">外注費</th>';
  h += '<th scope="col" class="text-right py-2 px-3 text-xs font-medium text-slate-500">粗利</th>';
  h += '<th scope="col" class="text-left py-2 px-3 text-xs font-medium text-slate-500 hidden sm:table-cell">案件</th>';
  h += '</tr></thead><tbody>';

  var cumSales = 0, cumCost = 0;
  months.forEach(function(m, i) {
    var d = monthData[m];
    cumSales += d.sales; cumCost += d.vendorCost;
    var profit = d.sales - d.vendorCost;
    var isCurrent = m === NOW;
    var isHalfBorder = (i === 5); // 12月の後に区切り

    var monthLabel = parseInt(m.split('-')[1]) + '月';
    var halfLabel = (i === 0) ? '<span class="text-xs text-slate-400 mr-1">前期</span>' : (i === 6) ? '<span class="text-xs text-slate-400 mr-1">後期</span>' : '';

    h += '<tr class="border-b border-slate-100 hover:bg-gray-50 ' + (isCurrent ? 'bg-primary-50/30' : '') + (isHalfBorder ? ' border-b-2 border-b-slate-300' : '') + '">';
    h += '<td class="py-2 px-3 font-medium ' + (isCurrent ? 'text-primary-600' : 'text-slate-700') + '">' + halfLabel + monthLabel + (isCurrent ? ' <span class="text-[10px] bg-primary-100 text-primary-600 px-1 rounded">今月</span>' : '') + '</td>';
    h += '<td class="py-2 px-3 text-right">' + (d.sales ? FMT(d.sales) : '<span class="text-slate-300">-</span>') + '</td>';
    h += '<td class="py-2 px-3 text-right">' + (d.vendorCost ? FMT(d.vendorCost) : '<span class="text-slate-300">-</span>') + '</td>';
    h += '<td class="py-2 px-3 text-right font-medium ' + (profit >= 0 ? 'text-emerald-600' : 'text-red-600') + '">' + (d.sales || d.vendorCost ? FMT(profit) : '<span class="text-slate-300">-</span>') + '</td>';
    h += '<td class="py-2 px-3 text-xs text-body hidden sm:table-cell">' + d.projects.join(', ') + '</td>';
    h += '</tr>';
  });

  // 合計行
  var totalProfit = cumSales - cumCost;
  h += '<tr class="bg-slate-50 font-bold">';
  h += '<td class="py-2 px-3 text-slate-900">合計</td>';
  h += '<td class="py-2 px-3 text-right">' + FMT(cumSales) + '</td>';
  h += '<td class="py-2 px-3 text-right">' + FMT(cumCost) + '</td>';
  h += '<td class="py-2 px-3 text-right ' + (totalProfit >= 0 ? 'text-emerald-600' : 'text-red-600') + '">' + FMT(totalProfit) + '</td>';
  h += '<td class="py-2 px-3 hidden sm:table-cell"></td>';
  h += '</tr>';

  h += '</tbody></table></div></div>';
  el('monthly-summary').innerHTML = h;
}

function kpiCard(label, val, sub) {
  return '<div class="bg-white rounded-xl border border-slate-200 p-4 sm:p-5 shadow-sm overflow-hidden">' +
    '<p class="text-xs font-medium text-slate-500 uppercase truncate">' + label + '</p>' +
    '<p class="text-lg sm:text-2xl font-bold text-slate-900 mt-1 truncate">' + val + '</p>' +
    (sub ? '<p class="text-xs text-slate-400 mt-1 truncate">' + sub + '</p>' : '') + '</div>';
}

function renderFilters() {
  var tabs = [['active','進行中'],['proposal','提案中'],['all','すべて'],['closed','完了'],['alert','要確認']];
  var h = tabs.map(function(t) {
    var active = t[0] === view;
    return '<button onclick="view=\'' + t[0] + '\';renderProjects();renderFilters()" class="px-3 py-1.5 text-xs font-medium rounded-full cursor-pointer ' +
      (active ? 'bg-primary-500 text-white' : 'bg-slate-100 text-slate-600') + '">' + t[1] + '</button>';
  }).join('');
  h += '<span style="border-left:1px solid #e2e8f0;height:20px;margin:0 4px"></span>';
  h += '<button onclick="groupMode=!groupMode;renderProjects();renderFilters()" class="px-3 py-1.5 text-xs font-medium rounded-full cursor-pointer ' +
    (groupMode ? 'bg-slate-700 text-white' : 'bg-slate-100 text-slate-600') + '">クライアント別</button>';

  // 請求月フィルター
  var allMonths = {};
  D.projects.forEach(function(p) {
    (p.vendors||[]).forEach(function(v) {
      if (v.expectedMonth) allMonths[v.expectedMonth] = true;
    });
  });
  var sortedMonths = Object.keys(allMonths).sort().reverse();
  h += '<span style="border-left:1px solid #e2e8f0;height:20px;margin:0 4px"></span>';
  h += '<select onchange="monthFilter=this.value;render()" class="px-2 py-1 text-xs border border-slate-200 rounded-lg bg-white cursor-pointer">';
  h += '<option value="">全月</option>';
  sortedMonths.forEach(function(m) {
    var label = m.replace('-','年') + '月';
    var selected = m === monthFilter ? ' selected' : '';
    h += '<option value="' + m + '"' + selected + '>' + label + '</option>';
  });
  h += '</select>';

  // 月が選択されている場合、その月のサマリーを表示
  if (monthFilter) {
    var mSales = 0, mCost = 0, mCount = 0;
    D.projects.forEach(function(p) {
      (p.vendors||[]).forEach(function(v) {
        if (v.expectedMonth === monthFilter) {
          mCost += v.amountTax || v.amount || 0;
          mCount++;
        }
      });
    });
    h += '<span class="text-xs text-slate-500 ml-2">外注 ' + mCount + '件 ' + FMT(mCost) + '</span>';
  }

  el('filters').innerHTML = h;
}

function renderProjects() {
  var list = D.projects;
  if (view === 'active') list = list.filter(function(p){return p.status==='active' || p.status==='proposal'});
  if (view === 'proposal') list = list.filter(function(p){return p.status==='proposal'});
  if (view === 'closed') list = list.filter(function(p){return p.status==='closed'});
  if (view === 'alert') list = list.filter(function(p){
    return (p.vendors||[]).some(function(v){return v.status==='planned' && v.expectedMonth && v.expectedMonth < NOW});
  });

  // 請求月フィルター: その月に外注がある案件 OR 毎月請求ありの案件を表示
  if (monthFilter) {
    list = list.filter(function(p) {
      return p.recurring || (p.vendors||[]).some(function(v){ return v.expectedMonth === monthFilter; });
    });
  }

  if (!list.length) {
    el('projects').innerHTML = '<div class="text-center py-16 text-slate-400">プロジェクトがありません</div>';
    return;
  }

  if (groupMode) {
    // Group by client category
    var groupOrder = [
      { label: '埼玉県庁', match: function(p){ return p.client === '埼玉県庁'; } },
      { label: '埼玉県物産観光協会', match: function(p){ return (p.client||'').indexOf('物産観光') >= 0; } },
      { label: '行政・官民連携', match: function(p){ return (p.client||'').indexOf('横瀬') >= 0 || (p.client||'').indexOf('コア') >= 0; } },
      { label: '民間クライアント', match: function(p){ return true; } },
    ];
    var used = {};
    var html = '';
    groupOrder.forEach(function(g) {
      var items = list.filter(function(p) {
        if (used[p.id]) return false;
        if (g.match(p)) { used[p.id] = true; return true; }
        return false;
      });
      if (!items.length) return;
      var groupTotal = items.reduce(function(s,p){ return s + (p.contractAmount || 0); }, 0);
      var groupVendor = items.reduce(function(s,p){ return s + (p.vendors||[]).reduce(function(s2,v){return s2+(v.amountTax||v.amount||0)},0); }, 0);
      html += '<div class="mb-6">';
      html += '<div class="flex flex-wrap items-center gap-3 mb-3">';
      html += '<h2 class="text-sm font-bold text-slate-500 uppercase">' + g.label + '</h2>';
      html += '<span class="text-xs text-slate-400">' + items.length + '件</span>';
      html += '<span class="text-xs text-slate-400">契約 ' + FMT(groupTotal) + '</span>';
      html += '<span class="text-xs text-slate-400">外注 ' + FMT(groupVendor) + '</span>';
      html += '<span class="text-xs font-medium ' + (groupTotal-groupVendor>=0?'text-emerald-600':'text-red-600') + '">利益 ' + FMT(groupTotal-groupVendor) + '</span>';
      html += '</div>';
      html += items.map(function(p){ return renderProjectCard(p); }).join('');
      html += '</div>';
    });
    el('projects').innerHTML = html;
    return;
  }

  el('projects').innerHTML = list.map(function(p) { return renderProjectCard(p); }).join('');
}

function renderProjectCard(p) {
    var vc = (p.vendors||[]).reduce(function(s,v){return s+(v.amountTax||v.amount||0)},0);
    var contractBase = p.contractAmount || 0;
    var pr = contractBase - vc;
    var mr = contractBase > 0 ? pr/contractBase : null;
    var mc = mr==null?'text-slate-300':mr>=0.6?'text-emerald-600':mr>=0.3?'text-amber-600':'text-red-600';
    var mt = mr!=null?(mr*100).toFixed(1)+'%':'-';
    var planned = (p.vendors||[]).filter(function(v){return v.status==='planned'}).length;
    var invoiced = (p.vendors||[]).filter(function(v){return v.status==='invoiced'}).length;

    var h = '<div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden mb-4">';

    // Header
    h += '<div class="p-5 pb-0"><div class="flex flex-wrap items-center justify-between gap-2 mb-2">' +
      '<div class="flex flex-wrap items-center gap-3">' +
        '<h3 class="text-lg font-bold text-slate-900">' + p.name + '</h3>' +
        (p.client ? '<span class="text-sm text-slate-400">' + p.client + '</span>' : '') +
        (p.billingTo && p.billingTo !== p.client ? '<span class="text-xs text-amber-500 ml-1">→ 請求先: ' + p.billingTo + '</span>' : '') +
        '<span class="px-2 py-0.5 rounded-full text-xs font-medium ' + (p.status==='active'?'bg-primary-50 text-primary-600':p.status==='proposal'?'bg-violet-50 text-violet-600':'bg-slate-100 text-slate-500') + '">' + (p.status==='active'?'進行中':p.status==='proposal'?'提案中':'完了') + '</span>' +
        (p.recurring ? '<span class="px-2 py-0.5 rounded-full text-xs font-medium bg-amber-50 text-amber-600">毎月請求</span>' : '') +
      '</div>' +
      '<div class="flex gap-1">' +
        '<button onclick="showProjectForm(\'' + p.id + '\')" class="px-2 py-1 text-xs bg-slate-100 text-slate-600 rounded cursor-pointer hover:bg-slate-200">編集</button>' +
        '<button onclick="delProj(\'' + p.id + '\')" class="px-2 py-1 text-xs text-red-400 rounded cursor-pointer hover:bg-red-50">削除</button>' +
      '</div></div>';

    // Project info grid
    var hasInfo = p.description || p.manager || p.scheduleStart || p.stakeholders || p.deliverables || p.risks;
    if (hasInfo) {
      h += '<div class="grid grid-cols-1 sm:grid-cols-3 gap-x-6 gap-y-2 mb-4 text-sm">';
      if (p.description) h += '<div class="col-span-3"><div class="info-label">概要</div><div class="info-val">' + p.description + '</div></div>';
      if (p.manager) h += '<div><div class="info-label">担当</div><div class="info-val">' + p.manager + '</div></div>';
      if (p.scheduleStart || p.scheduleEnd) h += '<div><div class="info-label">スケジュール</div><div class="info-val">' + (p.scheduleStart||'?') + ' 〜 ' + (p.scheduleEnd||'?') + '</div></div>';
      if (p.estimate) h += '<div><div class="info-label">見積</div><div class="info-val">' + FMT(p.estimate*1000) + '（税抜）</div></div>';
      if (p.stakeholders) h += '<div class="col-span-2"><div class="info-label">ステークホルダー</div><div class="info-val">' + p.stakeholders + '</div></div>';
      if (p.deliverables) h += '<div><div class="info-label">納品物</div><div class="info-val">' + p.deliverables + '</div></div>';
      if (p.risks) h += '<div class="col-span-3"><div class="info-label">リスク・注意</div><div class="info-val text-amber-700">' + p.risks + '</div></div>';
      h += '</div>';
    }

    // Metrics
    var contractAmt = p.contractAmount || 0;
    h += '<div class="flex flex-wrap gap-4 sm:gap-6 text-sm mb-4">' +
      '<div><span class="text-slate-400">契約</span> <strong>' + FMT(contractBase) + '</strong><span class="text-xs text-slate-400">税抜</span>' + (contractBase ? ' <span class="text-xs text-slate-300">(税込' + FMT(Math.round(contractBase*1.1)) + ')</span>' : '') + '</div>' +
      '<div><span class="text-slate-400">外注費</span> <strong>' + FMT(vc) + '</strong></div>' +
      '<div><span class="text-slate-400">利益</span> <strong class="' + (pr>=0?'':'text-red-600') + '">' + FMT(pr) + '</strong></div>' +
      '<div><span class="text-slate-400">利益率</span> <strong class="' + mc + '">' + mt + '</strong></div>' +
      (planned?'<span class="status-planned px-2 py-0.5 rounded-full text-xs font-medium">外注予定 '+planned+'</span>':'') +
      (invoiced?'<span class="status-invoiced px-2 py-0.5 rounded-full text-xs font-medium">外注請求済 '+invoiced+'</span>':'') +
    '</div></div>';

    // === Monthly summary table (recurring only) ===
    if (p.recurring) {
      var md = p.monthlyData || [];
      h += '<div class="px-5 mb-3">';
      h += '<div class="flex flex-wrap items-center justify-between gap-2 mb-2">';
      h += '<h4 class="text-xs font-bold text-slate-500 uppercase">月別運用サマリー</h4>';
      h += '<button onclick="addMonthly(\'' + p.id + '\')" class="inline-flex items-center justify-center gap-1.5 h-8 px-3 text-sm font-medium text-primary-500 hover:bg-primary-50 rounded-lg cursor-pointer">+ 月を追加</button>';
      h += '</div>';
      if (md.length) {
        var mdTotalRev = 0, mdTotalCost = 0;
        md.forEach(function(d){
          mdTotalRev += d.revenue || 0;
          var vc = (d.vendors||[]).reduce(function(s,v){return s+(v.amount||0)},0);
          mdTotalCost += d.vendorCost || vc;
        });
        var mdTotalProfit = mdTotalRev - mdTotalCost;
        h += '<div class="overflow-x-auto">';
        md.forEach(function(d) {
          var dVendors = d.vendors || [];
          var dCost = dVendors.length ? dVendors.reduce(function(s,v){return s+(v.amount||0)},0) : (d.vendorCost || 0);
          var profit = (d.revenue||0) - dCost;
          // Month header row
          h += '<div class="border border-slate-200 rounded-lg mb-3 overflow-hidden">';
          h += '<div class="flex flex-wrap items-center justify-between gap-2 px-4 py-3 bg-gray-50 border-b border-slate-200">';
          h += '<div class="flex flex-wrap items-center gap-4">';
          h += '<span class="font-bold text-slate-900">' + d.month + '</span>';
          h += '<span class="text-sm text-slate-500">売上 <strong class="text-slate-900">' + FMT(d.revenue||0) + '</strong></span>';
          h += '<span class="text-sm text-slate-500">外注費 <strong class="text-slate-900">' + FMT(dCost) + '</strong></span>';
          h += '<span class="text-sm text-slate-500">粗利 <strong class="' + (profit>=0?'text-emerald-600':'text-red-600') + '">' + FMT(profit) + '</strong></span>';
          if (d.note) h += '<span class="text-xs text-body">' + d.note + '</span>';
          h += '</div>';
          h += '<div class="flex gap-1">';
          h += '<button onclick="editMonthly(\'' + p.id + '\',\'' + d.month + '\')" class="px-1.5 py-0.5 text-xs bg-slate-100 text-slate-600 rounded cursor-pointer hover:bg-slate-200">編集</button>';
          h += '<button onclick="addMonthlyVendor(\'' + p.id + '\',\'' + d.month + '\')" class="px-1.5 py-0.5 text-xs bg-primary-50 text-primary-600 rounded cursor-pointer hover:bg-primary-100">+ 外注</button>';
          h += '<button onclick="delMonthly(\'' + p.id + '\',\'' + d.month + '\')" class="px-1.5 py-0.5 text-xs text-red-400 rounded cursor-pointer hover:bg-red-50">削除</button>';
          h += '</div></div>';
          // Vendor sub-table
          if (dVendors.length) {
            h += '<table class="w-full text-sm"><thead><tr class="border-b border-slate-100">';
            h += '<th scope="col" class="text-left py-1.5 px-4 text-xs font-medium text-slate-400">外注先</th>';
            h += '<th scope="col" class="text-left py-1.5 px-3 text-xs font-medium text-slate-400">内容</th>';
            h += '<th scope="col" class="text-right py-1.5 px-3 text-xs font-medium text-slate-400">金額(税抜)</th>';
            h += '<th scope="col" class="w-20"></th>';
            h += '</tr></thead><tbody>';
            dVendors.forEach(function(v){
              h += '<tr class="border-b border-slate-50 hover:bg-gray-50">';
              h += '<td class="py-1.5 px-4 font-medium text-slate-700">' + v.vendor + '</td>';
              h += '<td class="py-1.5 px-3 text-body">' + (v.task||'') + '</td>';
              h += '<td class="py-1.5 px-3 text-right font-medium">' + FMT(v.amount||0) + '</td>';
              h += '<td class="py-1.5 px-3 text-center"><div class="flex gap-1 justify-center">';
              h += '<button onclick="editMonthlyVendor(\'' + p.id + '\',\'' + d.month + '\',\'' + v.id + '\')" class="px-1 py-0.5 text-xs bg-slate-100 text-slate-600 rounded cursor-pointer">編集</button>';
              h += '<button onclick="delMonthlyVendor(\'' + p.id + '\',\'' + d.month + '\',\'' + v.id + '\')" class="px-1 py-0.5 text-xs text-red-400 rounded cursor-pointer">削除</button>';
              h += '</div></td></tr>';
            });
            h += '</tbody></table>';
          } else {
            h += '<div class="px-4 py-2 text-xs text-slate-400">外注先未登録</div>';
          }
          h += '</div>';
        });
        // Grand total
        h += '<div class="flex flex-wrap gap-4 px-2 py-2 text-sm font-bold">';
        h += '<span class="text-slate-500">合計</span>';
        h += '<span>売上 ' + FMT(mdTotalRev) + '</span>';
        h += '<span>外注費 ' + FMT(mdTotalCost) + '</span>';
        h += '<span class="' + (mdTotalProfit>=0?'text-emerald-600':'text-red-600') + '">粗利 ' + FMT(mdTotalProfit) + '</span>';
        h += '</div>';
        h += '</div>';
      }
      h += '</div>';
    }

    // === Billing schedule (client invoices) ===
    var billings = p.billings || [];
    var billedTotal = billings.filter(function(b){return b.status==='received' || b.status==='invoiced'}).reduce(function(s,b){return s+b.amount},0);
    var remaining = contractBase - billedTotal;

    h += '<div class="px-5 mb-3">';
    h += '<div class="flex flex-wrap items-center gap-3 mb-2">';
    h += '<h4 class="text-xs font-bold text-slate-500 uppercase">請求スケジュール（クライアントへ）</h4>';
    if (contractBase > 0) {
      h += '<span class="text-xs text-slate-500">契約 ' + FMT(contractBase) + '</span>';
      if (billedTotal > 0) h += '<span class="text-xs text-emerald-600 font-medium">請求済 ' + FMT(billedTotal) + '</span>';
      h += '<span class="text-xs font-medium ' + (remaining > 0 ? 'text-amber-600' : remaining === 0 ? 'text-emerald-600' : 'text-red-600') + '">残り ' + FMT(remaining) + '</span>';
    }
    h += '</div>';

    if (billings.length) {
      h += '<div class="flex gap-2 flex-wrap">';
      billings.forEach(function(b) {
        var bc = b.status==='received' ? 'bg-emerald-50 border-emerald-200 text-emerald-800' :
                 b.status==='invoiced' ? 'bg-amber-50 border-amber-200 text-amber-800' :
                 'bg-slate-50 border-slate-200 text-slate-700';
        var bs = b.status==='received' ? '入金済' : b.status==='invoiced' ? '請求済' : '予定';
        h += '<div class="flex items-center gap-2 px-3 py-2 rounded-lg border text-sm ' + bc + '">' +
          '<strong>' + FMT(b.amount) + '</strong>' +
          '<span class="text-xs">' + (b.date||'') + '</span>' +
          '<span class="px-1.5 py-0.5 rounded text-xs font-medium bg-white/50">' + bs + '</span>' +
          (b.note ? '<span class="text-xs opacity-70">' + b.note + '</span>' : '') +
          '<button onclick="editBilling(\'' + p.id + '\',\'' + b.id + '\')" class="ml-1 px-1 py-0.5 text-xs rounded cursor-pointer hover:bg-white/50" title="編集">✎</button>' +
          '<button onclick="cycleBilling(\'' + p.id + '\',\'' + b.id + '\')" class="px-1 py-0.5 text-xs rounded cursor-pointer hover:bg-white/50" title="ステータス切替">&#x21bb;</button>' +
        '</div>';
      });
      h += '<button onclick="addBilling(\'' + p.id + '\')" class="px-3 py-2 rounded-lg border border-dashed border-slate-300 text-xs text-slate-400 hover:border-primary-300 hover:text-primary-500 cursor-pointer">+ 請求追加</button>';
      h += '</div>';
    } else {
      // 請求スケジュール未登録でも残額表示
      h += '<button onclick="addBilling(\'' + p.id + '\')" class="text-xs text-primary-500 hover:text-primary-700 cursor-pointer">+ 請求スケジュールを追加</button>';
    }
    h += '</div>';

    // === Vendor table (outgoing costs) ===
    h += '<div class="px-5"><h4 class="text-xs font-bold text-slate-500 uppercase mb-2">外注・費用（支払い）</h4></div>';

    // Vendor table
    if ((p.vendors||[]).length) {
      h += '<div class="px-5 overflow-x-auto"><table class="w-full text-sm mb-3 min-w-[600px]"><thead><tr class="border-b border-slate-200 bg-gray-50">' +
        '<th scope="col" class="text-left py-2 px-3 text-xs font-medium text-slate-500">外注先 / 費用</th>' +
        '<th scope="col" class="text-left py-2 px-3 text-xs font-medium text-slate-500">内容</th>' +
        '<th scope="col" class="text-right py-2 px-3 text-xs font-medium text-slate-500">金額</th>' +
        '<th scope="col" class="text-center py-2 px-3 text-xs font-medium text-slate-500">請求月</th>' +
        '<th scope="col" class="text-center py-2 px-3 text-xs font-medium text-slate-500">状態</th>' +
        '<th scope="col" class="text-left py-2 px-3 text-xs font-medium text-slate-500">メモ</th>' +
        '<th scope="col" class="w-28"></th></tr></thead><tbody>';

      (p.vendors||[]).forEach(function(v) {
        var sc = v.status==='planned'?'status-planned':v.status==='invoiced'?'status-invoiced':'status-paid';
        var sl = v.status==='planned'?'予定':v.status==='invoiced'?'請求済':'支払済';
        var od = v.status==='planned' && v.expectedMonth && v.expectedMonth < NOW;

        h += '<tr class="border-b border-slate-100 hover:bg-gray-50' + (od?' bg-red-50':'') + '">' +
          '<td class="py-2 px-3 font-medium text-slate-900">' + v.vendor + '</td>' +
          '<td class="py-2 px-3 text-body">' + (v.task||'') + '</td>' +
          '<td class="py-2 px-3 text-right font-medium">' + FMT(v.amountTax||v.amount) +
            (v.amount&&v.amountTax?'<div class="text-xs text-slate-400">税抜'+FMT(v.amount)+'</div>':'') + '</td>' +
          '<td class="py-2 px-3 text-center">' + (v.expectedMonth||'-') + (od?'<div class="text-xs text-red-500 font-medium">超過</div>':'') + '</td>' +
          '<td class="py-2 px-3 text-center"><span class="px-2 py-0.5 rounded-full text-xs font-medium '+sc+'">'+sl+'</span></td>' +
          '<td class="py-2 px-3 text-xs text-body">' + (v.note||'') + '</td>' +
          '<td class="py-2 px-3 text-center"><div class="flex gap-1 justify-center">';
        if (v.status==='planned') h += '<button onclick="vstat(\''+p.id+'\',\''+v.id+'\',\'invoiced\')" class="px-1.5 py-0.5 text-xs bg-amber-50 text-amber-700 rounded cursor-pointer">請求済</button>';
        if (v.status==='invoiced') h += '<button onclick="vstat(\''+p.id+'\',\''+v.id+'\',\'paid\')" class="px-1.5 py-0.5 text-xs bg-emerald-50 text-emerald-700 rounded cursor-pointer">支払済</button>';
        h += '<button onclick="showVendorForm(\''+p.id+'\',\''+v.id+'\')" class="px-1.5 py-0.5 text-xs bg-slate-100 text-slate-600 rounded cursor-pointer">編集</button>' +
          '<button onclick="vdel(\''+p.id+'\',\''+v.id+'\')" class="px-1.5 py-0.5 text-xs text-red-400 rounded cursor-pointer">削除</button>' +
          '</div></td></tr>';
      });
      h += '</tbody></table></div>';
    }

    // Add button
    h += '<div class="px-5 pb-4"><button onclick="showVendorForm(\'' + p.id + '\')" class="inline-flex items-center gap-1 h-8 px-3 text-sm font-medium text-primary-500 hover:bg-primary-50 rounded-lg cursor-pointer">+ 外注・費用を追加</button></div>';

    h += '</div>';
    return h;
}

// ===== INVOICE SCAN =====
function scanInvoices() {
  el('scan-month').value = NOW;
  el('scan-out').innerHTML = '<p class="text-slate-400 text-center py-4">照合月を選んで「照合実行」を押してください</p>';
  el('sm').style.display = 'flex';
}

async function runMonthScan() {
  var month = el('scan-month').value;
  if (!month) return;
  el('scan-out').innerHTML = '<p class="text-slate-400">スキャン中...</p>';

  try {
    // サーバー側で月別フォルダスキャン＆照合
    var r = await (await fetch('/api/invoices/scan?month=' + month)).json();

    var matched = r.matched || [];
    var unmatchedInvoices = r.unmatchedInvoices || [];
    var unmatchedMemos = r.unmatchedMemos || [];

    // プロジェクトIDを補完（markInvoiced用）
    matched.forEach(function(m) {
      if (!m.memo.pid) {
        D.projects.forEach(function(p) {
          (p.vendors||[]).forEach(function(v) {
            if (v.id === m.memo.id) m.memo.pid = p.id;
          });
        });
      }
    });

    var h = '';

    // Summary bar
    var totalExpected = matched.length + unmatchedMemos.length;
    h += '<div class="flex flex-wrap items-center gap-4 p-4 bg-slate-50 rounded-lg mb-4">';
    h += '<div class="text-sm"><span class="text-slate-500">対象月:</span> <strong>' + month + '</strong></div>';
    h += '<div class="text-sm"><span class="text-slate-500">PDF:</span> <strong>' + r.totalFiles + '件</strong></div>';
    h += '<div class="text-sm"><span class="text-slate-500">支払予定:</span> <strong>' + totalExpected + '件</strong></div>';
    if (matched.length) h += '<div class="text-sm text-emerald-600 font-medium">照合OK ' + matched.length + '件</div>';
    var diffCount = matched.filter(function(m){ return m.amountDiff !== 0; }).length;
    if (diffCount) h += '<div class="text-sm text-amber-600 font-medium">金額差異 ' + diffCount + '件</div>';
    if (unmatchedMemos.length) h += '<div class="text-sm text-red-500 font-medium">PDF未着 ' + unmatchedMemos.length + '件</div>';
    if (unmatchedInvoices.length) h += '<div class="text-sm text-amber-600 font-medium">予定外PDF ' + unmatchedInvoices.length + '件</div>';
    h += '</div>';

    // 照合結果テーブル
    if (matched.length) {
      h += '<h3 class="text-xs font-bold text-slate-500 uppercase mb-2">照合結果</h3>';
      h += '<div class="overflow-x-auto"><table class="w-full text-sm mb-4 min-w-[600px]"><thead><tr class="border-b border-slate-200 bg-gray-50">';
      h += '<th scope="col" class="text-left py-2 px-3 text-xs font-medium text-slate-500">プロジェクト</th>';
      h += '<th scope="col" class="text-left py-2 px-3 text-xs font-medium text-slate-500">外注先</th>';
      h += '<th scope="col" class="text-right py-2 px-3 text-xs font-medium text-slate-500">予定金額</th>';
      h += '<th scope="col" class="text-right py-2 px-3 text-xs font-medium text-slate-500">請求金額</th>';
      h += '<th scope="col" class="text-center py-2 px-3 text-xs font-medium text-slate-500">差異</th>';
      h += '<th scope="col" class="text-center py-2 px-3 text-xs font-medium text-slate-500">確度</th>';
      h += '<th scope="col" class="text-center py-2 px-3 text-xs font-medium text-slate-500">操作</th>';
      h += '</tr></thead><tbody>';

      matched.forEach(function(m) {
        var hasDiff = m.amountDiff !== 0;
        var rowClass = hasDiff ? 'bg-amber-50/50' : 'bg-emerald-50/50';
        var expectedAmt = m.memo.amountTax || m.memo.amount || 0;
        var invoiceAmt = m.invoice.amount || 0;
        var conf = m.matchConfidence || 0;
        var confClass = conf >= 80 ? 'bg-emerald-100 text-emerald-700' : conf >= 60 ? 'bg-amber-100 text-amber-700' : 'bg-red-100 text-red-600';

        h += '<tr class="border-b border-slate-100 ' + rowClass + '">';
        h += '<td class="py-2 px-3 text-body">' + (m.memo.project||'') + '</td>';
        h += '<td class="py-2 px-3 font-medium text-slate-900">' + (m.memo.vendor||'') + '<div class="text-xs text-slate-400" title="' + (m.invoice.file||'') + '">PDF: ' + (m.invoice.vendor||'不明') + '</div></td>';
        h += '<td class="py-2 px-3 text-right">' + FMT(expectedAmt) + '</td>';
        h += '<td class="py-2 px-3 text-right font-medium">' + FMT(invoiceAmt) + '</td>';
        if (hasDiff) {
          var diffStr = (m.amountDiff > 0 ? '+' : '') + FMT(m.amountDiff);
          h += '<td class="py-2 px-3 text-center"><span class="text-xs font-medium text-red-600">' + diffStr + '</span></td>';
        } else {
          h += '<td class="py-2 px-3 text-center"><span class="text-xs text-emerald-600 font-bold">✓</span></td>';
        }
        h += '<td class="py-2 px-3 text-center"><span class="px-1.5 py-0.5 rounded text-xs font-medium ' + confClass + '">' + conf + '%</span></td>';
        h += '<td class="py-2 px-3 text-center"><button onclick="markInvoiced(\'' + (m.memo.pid||'') + '\',\'' + (m.memo.id||'') + '\')" class="px-2 py-0.5 text-xs bg-primary-50 text-primary-700 rounded cursor-pointer hover:bg-primary-100">請求済に</button></td>';
        h += '</tr>';
      });
      h += '</tbody></table></div>';
    }

    // PDF未着（予定はあるがPDFなし）
    if (unmatchedMemos.length) {
      h += '<h3 class="text-xs font-bold text-red-600 uppercase mb-2 mt-4">PDF未着（' + unmatchedMemos.length + '件）</h3>';
      h += '<div class="space-y-1 mb-4">';
      unmatchedMemos.forEach(function(m) {
        h += '<div class="flex items-center justify-between text-sm py-2 px-3 bg-red-50 rounded-lg">';
        h += '<div><strong>' + (m.vendor||'') + '</strong> <span class="text-xs text-body">' + (m.project||'') + '</span></div>';
        h += '<span class="font-medium">' + FMT(m.amountTax || m.amount) + '</span>';
        h += '</div>';
      });
      h += '</div>';
    }

    // 予定外PDF（PDFはあるが予定に登録なし）
    if (unmatchedInvoices.length) {
      h += '<h3 class="text-xs font-bold text-amber-700 uppercase mb-2 mt-4">予定外のPDF（' + unmatchedInvoices.length + '件）</h3>';
      h += '<div class="space-y-1">';
      unmatchedInvoices.forEach(function(inv) {
        h += '<div class="flex items-center justify-between text-sm py-2 px-3 bg-amber-50 rounded-lg">';
        h += '<div><strong>' + (inv.file||'') + '</strong>';
        if (inv.vendor) h += '<span class="text-xs text-slate-500 ml-2">' + inv.vendor + '</span>';
        h += '</div>';
        if (inv.amount) h += '<span class="font-medium">' + FMT(inv.amount) + '</span>';
        h += '</div>';
      });
      h += '</div>';
    }

    // PDFなし案内
    if (!r.totalFiles) {
      h += '<div class="mt-4 p-4 bg-slate-50 rounded-lg text-center text-slate-400">';
      h += '<p>invoices/' + month + '/ フォルダにPDFがありません</p>';
      h += '<p class="text-xs mt-1">sales/invoices/' + month + '/ に請求書PDFを入れてスキャンしてください</p>';
      h += '</div>';
    }

    el('scan-out').innerHTML = h;
  } catch(e) {
    el('scan-out').innerHTML = '<p class="text-red-500">エラー: ' + e.message + '</p>';
  }
}

async function markInvoiced(pid, vid) {
  var p = D.projects.find(function(x){return x.id===pid});
  var v = p ? (p.vendors||[]).find(function(x){return x.id===vid}) : null;
  if (v) { v.status = 'invoiced'; await save(); toast('請求済に更新'); render(); runMonthScan(); }
}

// ===== BILLING CRUD =====
async function addBilling(pid) {
  var p = D.projects.find(function(x){return x.id===pid});
  if (!p) return;
  // 残額を計算してデフォルト値にする
  var billedTotal = (p.billings||[]).filter(function(b){return b.status==='received' || b.status==='invoiced'}).reduce(function(s,b){return s+b.amount},0);
  var remaining = (p.contractAmount || 0) - billedTotal;
  var taxIncRemaining = remaining > 0 ? Math.round(remaining * 1.1) : '';
  var amount = prompt('請求金額（税抜・円）を入力:', remaining > 0 ? remaining : '');
  if (!amount) return;
  var amountNum = parseFloat(amount) || 0;
  var date = prompt('請求月（例: 2026-03）:', NOW);
  if (!p.billings) p.billings = [];
  p.billings.push({
    id: gid(), amount: amountNum, date: date||'',
    status: 'planned', note: '',
  });
  await save(); toast('請求追加'); render();
}

async function editBilling(pid, bid) {
  var p = D.projects.find(function(x){return x.id===pid});
  if (!p) return;
  var b = (p.billings||[]).find(function(x){return x.id===bid});
  if (!b) return;
  var amount = prompt('請求金額（税抜・円）:', b.amount||'');
  if (amount === null) return;
  var date = prompt('請求月:', b.date||'');
  if (date === null) return;
  var note = prompt('メモ:', b.note||'');
  b.amount = parseFloat(amount)||0;
  b.date = date;
  b.note = note !== null ? note : b.note;
  var del = confirm('この請求を削除しますか？（キャンセル=残す）');
  if (del) { p.billings = p.billings.filter(function(x){return x.id!==bid}); }
  await save(); toast('更新'); render();
}

async function cycleBilling(pid, bid) {
  var p = D.projects.find(function(x){return x.id===pid});
  if (!p) return;
  var b = (p.billings||[]).find(function(x){return x.id===bid});
  if (!b) return;
  var order = ['planned','invoiced','received'];
  var idx = order.indexOf(b.status);
  b.status = order[(idx+1) % order.length];
  await save(); toast('ステータス更新'); render();
}

// ===== MONTHLY DATA CRUD =====
// === Monthly data CRUD ===
async function addMonthly(pid) {
  var p = D.projects.find(function(x){ return x.id === pid; });
  if (!p) return;
  var month = prompt('月を入力 (例: 2026-03)', NOW);
  if (!month) return;
  var revenue = parseFloat(prompt('売上（税抜）', '0')) || 0;
  var note = prompt('備考（任意）', '') || '';
  if (!p.monthlyData) p.monthlyData = [];
  // 同月がすでにあれば警告
  var exists = p.monthlyData.find(function(d){ return d.month === month; });
  if (exists) { alert(month + ' は既に登録されています。既存の行を編集してください。'); return; }
  p.monthlyData.push({ month: month, revenue: revenue, vendors: [], note: note });
  p.monthlyData.sort(function(a, b){ return b.month.localeCompare(a.month); });
  await save(); render(); toast('月追加');
}

async function editMonthly(pid, month) {
  var p = D.projects.find(function(x){ return x.id === pid; });
  if (!p || !p.monthlyData) return;
  var entry = p.monthlyData.find(function(d){ return d.month === month; });
  if (!entry) return;
  var newMonth = prompt('月', entry.month);
  if (newMonth === null) return;
  var revenue = prompt('売上（税抜）', entry.revenue || 0);
  if (revenue === null) return;
  var note = prompt('備考（任意）', entry.note || '');
  entry.month = newMonth || entry.month;
  entry.revenue = parseFloat(revenue) || 0;
  entry.note = note !== null ? note : entry.note;
  p.monthlyData.sort(function(a, b){ return b.month.localeCompare(a.month); });
  await save(); render(); toast('月データ更新');
}

async function delMonthly(pid, month) {
  if (!confirm(month + ' のデータを削除しますか？（外注先データも削除されます）')) return;
  var p = D.projects.find(function(x){ return x.id === pid; });
  if (!p || !p.monthlyData) return;
  p.monthlyData = p.monthlyData.filter(function(d){ return d.month !== month; });
  await save(); render(); toast('月データ削除');
}

// === Monthly vendor CRUD ===
async function addMonthlyVendor(pid, month) {
  var p = D.projects.find(function(x){ return x.id === pid; });

async function editMonthlyVendor(pid, month, vid) {

async function delMonthlyVendor(pid, month, vid) {
  if (!confirm('この外注先を削除しますか？')) return;
  var p = D.projects.find(function(x){ return x.id === pid; });
  if (!p || !p.monthlyData) return;
  var entry = p.monthlyData.find(function(d){ return d.month === month; });
  if (!entry || !entry.vendors) return;
  entry.vendors = entry.vendors.filter(function(x){ return x.id !== vid; });
  await save(); render(); toast('外注先削除');
}

function toast(msg) { var t=el('toast'); t.textContent=msg+'しました'; t.classList.add('show'); setTimeout(function(){t.classList.remove('show')},2000); }

load();
loadVendorDB();
